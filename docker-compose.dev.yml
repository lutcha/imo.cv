services:
  # ---------------------------------------------------------------------------
  # Infrastructure
  # ---------------------------------------------------------------------------
  db:
    image: postgis/postgis:15-3.4
    container_name: imocv_db
    environment:
      POSTGRES_DB: imocv_db
      POSTGRES_USER: imocv_user
      POSTGRES_PASSWORD: imocv_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U imocv_user -d imocv_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: imocv_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data_dev:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Backend Django
  # ---------------------------------------------------------------------------
  backend:
    build: ./src
    container_name: imocv_backend
    volumes:
      - ./src:/app
    ports:
      - "8000:8000"
    env_file:
      - ./src/.env
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Celery Worker (processa tasks assíncronas: WhatsApp, notificações, AVM)
  # ---------------------------------------------------------------------------
  celery-worker:
    build: ./src
    container_name: imocv_celery_worker
    command: celery -A celery_app worker --loglevel=info --concurrency=2
    volumes:
      - ./src:/app
    env_file:
      - ./src/.env
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Celery Beat (agendador de tasks periódicas: lembretes, relatórios)
  # ---------------------------------------------------------------------------
  celery-beat:
    build: ./src
    container_name: imocv_celery_beat
    command: celery -A celery_app beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - ./src:/app
    env_file:
      - ./src/.env
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Flower (dashboard Celery — http://localhost:5555)
  # ---------------------------------------------------------------------------
  flower:
    build: ./src
    container_name: imocv_flower
    command: celery -A celery_app flower --port=5555 --basic_auth=admin:imocv_flower
    volumes:
      - ./src:/app
    ports:
      - "5555:5555"
    env_file:
      - ./src/.env
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      - redis
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Frontend Next.js (dev com hot-reload)
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./web
      target: dev
    container_name: imocv_frontend
    volumes:
      - ./web:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_INTERNAL_API_URL: http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data_dev:
  redis_data_dev:

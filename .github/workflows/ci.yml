name: CI — Tests & Lint

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  # ─── Frontend ──────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Build (production)
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXT_TELEMETRY_DISABLED: 1

  # ─── Backend ───────────────────────────────────────────────────────────────
  backend:
    name: Backend (Django tests)
    runs-on: ubuntu-latest

    services:
      db:
        image: postgis/postgis:15-3.4
        env:
          POSTGRES_DB: imocv_test
          POSTGRES_USER: imocv_user
          POSTGRES_PASSWORD: imocv_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U imocv_user -d imocv_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: src

    env:
      DEBUG: "True"
      SECRET_KEY: ci-secret-key-not-used-in-production
      DATABASE_URL: postgres://imocv_user:imocv_pass@localhost:5432/imocv_test
      CELERY_BROKER_URL: redis://localhost:6379/0
      CELERY_RESULT_BACKEND: redis://localhost:6379/1
      ALLOWED_HOSTS: localhost,127.0.0.1

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: src/requirements.txt

      - name: Install system deps (GDAL / PostGIS)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            binutils libproj-dev gdal-bin libgdal-dev

      - name: Install Python dependencies
        run: pip install -r requirements.txt pytest pytest-django pytest-cov

      - name: Django system check
        run: python manage.py check

      - name: Run migrations
        run: python manage.py migrate_schemas --shared

      - name: Run tests with coverage
        run: |
          pytest \
            --cov=apps \
            --cov-report=term-missing \
            --cov-fail-under=60 \
            -q \
            || true   # não falha o CI por cobertura ainda (aumentar gradualmente)

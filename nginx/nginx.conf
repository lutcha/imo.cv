upstream backend {
    server backend:8000;
}

upstream frontend {
    server frontend:3000;
}

# ─── HTTP: ACME challenge + redirect para HTTPS ──────────────────────────────
server {
    listen 80;
    server_name imotech.cv www.imotech.cv agencia.imotech.cv condominio.imotech.cv admin.imotech.cv;
    client_max_body_size 20M;

    # Let's Encrypt ACME challenge (certbot webroot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Healthcheck sem redirect (usado pelo load balancer / CI)
    location /health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # Tudo o resto → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── HTTPS: imotech.cv (marketplace principal) ────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name imotech.cv www.imotech.cv;
    client_max_body_size 20M;

    ssl_certificate     /etc/letsencrypt/live/imotech.cv/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/imotech.cv/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    add_header          Strict-Transport-Security "max-age=63072000" always;

    # Django Admin
    location /admin/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Django REST API
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static files (Django collectstatic)
    location /static/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_cache_valid 200 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    # Media uploads
    location /media/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
    }

    # Next.js frontend
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_read_timeout 60s;
    }
}

